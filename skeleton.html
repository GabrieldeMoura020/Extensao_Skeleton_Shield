<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        img {
            width: 200px;
            height: auto;
            animation: skeletonFadeIn 0.4s ease;
        }
        @keyframes skeletonFadeIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <img src="skeleton.gif" alt="Skeleton">
</body>
</html>
